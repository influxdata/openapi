get:
  operationId: ListStacks
  tags:
    - Templates
  summary: List installed stacks
  description: |
    Retrieves a list of installed InfluxDB stacks.

    To limit which stacks are returned, pass query parameters in your request.
    If no query parameters are passed, InfluxDB returns all stacks up to the default `limit`.
  parameters:
    - in: query
      name: orgID
      required: true
      schema:
        type: string
      description: |
        The ID of the organization that owns the stacks.
        Only returns stacks owned by this organization.

        #### InfluxDB Cloud

        - Doesn't require this parameter; InfluxDB only returns resources that the **API token** can read.
    - in: query
      name: name
      schema:
        type: string
      description: |
        A collection of stack event names.
        Only returns stacks with events that have one of the names.
    - in: query
      name: stackID
      schema:
        type: string
      description: |
        A collection of stack IDs.
        Only returns stacks that have one of the IDs.
  responses:
    "200":
      description: Success. The response body contains the list of stacks.
      content:
        application/json:
          schema:
            type: object
            properties:
              stacks:
                type: array
                items:
                  $ref: "../schemas/Stack.yml"
    "400":
      description: |
        Bad request.
        The response body contains detail about the error.
    
        #### InfluxDB OSS
    
        - Returns this error if an incorrect value is passed for `org` or `orgID`.
      content:
        application/json:
          schema:
            $ref: "../schemas/Error.yml"
          examples:
            orgIdMissing:
              summary: The orgID query parameter is missing
              value: {
                "code": "invalid",
                "message": "organization id[\"\"] is invalid: id must have a length of 16 bytes"
              }
            orgProvidedNotFound:
              summary: The org or orgID passed doesn't own the token passed in the header
              value: {
                "code":"invalid",
                "message":"failed to decode request body: organization not found"
              }
    "401":
      $ref: "../responses/AuthorizationError.yml"
    "500":
      $ref: "../responses/InternalServerError.yml"
    default:
      description: Unexpected error
      content:
        application/json:
          schema:
            $ref: "../schemas/Error.yml"                  
post:
  operationId: CreateStack
  tags:
    - Templates
  summary: Create a new stack
  requestBody:
    description: The stack to create.
    required: true
    content:
      application/json:
        schema:
          type: object
          title: PostStackRequest
          properties:
            orgID:
              type: string
            name:
              type: string
            description:
              type: string
            urls:
              type: array
              items:
                type: string
  responses:
    "201":
      description: Success. Returns the newly created stack.
      content:
        application/json:
          schema:
            $ref: "../schemas/Stack.yml"
    default:
      description: Unexpected error
      content:
        application/json:
          schema:
            $ref: "../schemas/Error.yml"
