post:
  operationId: ApplyTemplate
  tags:
    - Templates
  summary: Apply or dry-run a template
  description: |
    Applies a template to the organization and returns the list of resources that
    the template
    If you pass _`dryRun: true`_ in the request body, InfluxDB simulates the
    template run and doesn't create, update, or delete resources.
    
    #### Required permissions

    - `write` permissions for resource types in the template.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../schemas/TemplateApply.yml"
      application/x-jsonnet:
        schema:
          $ref: "../schemas/TemplateApply.yml"
      text/yml:
        schema:
          $ref: "../schemas/TemplateApply.yml"
  x-codeSample:
    lang: Shell
    label: "cURL: dry run remote template"
    source: |
        curl -v --request POST \
        "${INFLUX_URL}/api/v2/templates/apply" \
        --header "Authorization: Token ${INFLUX_ALL_ACCESS_TOKEN}" \
        --data @- << EOF
          {
            "dryRun": true,
            "orgID": "$INFLUX_ORG_ID",
            "remotes": [
              {
                "url": "$TEMPLATE_URL"
              }
            ]
          }
        EOF
  responses:
    "200":
      description: >
        Success.
        The package dry-run succeeded.
        No new resources were created.
        Returns a diff and summary of the dry-run.
        The diff and summary won't contain IDs for resources
        that didn't exist at the time of the dry-run.
      content:
        application/json:
          schema:
            $ref: "../schemas/TemplateSummary.yml"
    "201":
      description: >
        Success.
        The package applied successfully.
        Returns a diff and summary of the run.
        The summary contains newly created resources.
        The diff compares the initial state to the state after the package applied.
        This corresponds to `"dryRun": true`.
      content:
        application/json:
          schema:
            $ref: "../schemas/TemplateSummary.yml"
    "422":
      description: Template failed validation
      content:
        application/json:
          schema:
            $ref: "../schemas/TemplateSummaryError.yml"
    default:
      description: Unexpected error
      content:
        application/json:
          schema:
            $ref: "../schemas/Error.yml"
